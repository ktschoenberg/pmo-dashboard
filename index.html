<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMO · Delivery Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange:#F96302; --orange-d:#D95000; --orange-pale:#FFF4EE; --orange-rim:#FDDCBB;
      --g25:#FCFCFD; --g50:#F9FAFB; --g100:#F2F4F7; --g200:#E4E7EC;
      --g300:#D0D5DD; --g400:#98A2B3; --g500:#667085; --g600:#475467;
      --g700:#344054; --g900:#101828;
      --green:#12B76A; --amber:#F79009; --red:#F04438;
      --blue:#2E90FA; --purple:#9E77ED;
      --xs:0 1px 2px rgba(16,24,40,.05);
      --sm:0 1px 3px rgba(16,24,40,.1),0 1px 2px rgba(16,24,40,.06);
      --md:0 4px 8px -2px rgba(16,24,40,.1),0 2px 4px -2px rgba(16,24,40,.06);
      --lg:0 12px 16px -4px rgba(16,24,40,.08),0 4px 6px -2px rgba(16,24,40,.03);
      --xl:0 20px 24px -4px rgba(16,24,40,.08),0 8px 8px -4px rgba(16,24,40,.03);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',-apple-system,sans-serif;background:var(--g50);color:var(--g900);font-size:14px;line-height:1.5;min-height:100vh;}

    .chip{font-size:11px;color:var(--g500);padding:4px 10px;border:1px solid var(--g200);border-radius:6px;background:var(--g50);}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;border:1px solid transparent;font:500 12px/1 'Inter',sans-serif;cursor:pointer;transition:all .14s;white-space:nowrap;}
    .btn-primary{background:var(--orange);color:#fff;border-color:var(--orange);}
    .btn-primary:hover{background:var(--orange-d);}
    .btn-ghost{background:#fff;color:var(--g700);border-color:var(--g300);}
    .btn-ghost:hover{background:var(--g50);}
    .btn-active{background:var(--orange-pale);color:var(--orange);border-color:var(--orange-rim);}


    /* ── SHELL ──────────────────────────────────────── */
    .shell{display:flex;height:100vh;overflow:hidden;}

    /* ── LEFT SIDEBAR ───────────────────────────────── */
    .lsidebar{width:220px;flex-shrink:0;background:#0C111D;display:flex;flex-direction:column;overflow-y:auto;}
    .ls-brand{display:flex;align-items:center;gap:9px;padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.07);}
    .ls-mark{width:30px;height:30px;border-radius:7px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;letter-spacing:-.02em;}
    .ls-appname{font-size:12px;font-weight:700;color:#fff;line-height:1.25;}
    .ls-appsub{font-size:10.5px;color:rgba(255,255,255,.5);margin-top:1px;}
    .ls-nav{padding:8px 6px;flex:1;}
    .ls-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:#fff;transition:background .12s;border:none;background:none;width:100%;text-align:left;font-family:'Inter',sans-serif;margin-bottom:1px;}
    .ls-item:hover{background:#161B27;}
    .ls-item.active{background:#1D2939;font-weight:600;}
    .ls-item svg{width:15px;height:15px;flex-shrink:0;color:#fff;opacity:1;transition:opacity .12s;}
    .ls-item:hover svg,.ls-item.active svg{opacity:1;}
    .ls-count{margin-left:auto;font-size:10px;font-weight:600;color:#fff;background:rgba(255,255,255,.12);padding:1px 7px;border-radius:10px;}
    .ls-item.active .ls-count{color:rgba(255,255,255,.7);}
    .ls-divider{height:1px;background:rgba(255,255,255,.06);margin:6px 8px;}
    .ls-footer{padding:10px 12px 14px;border-top:1px solid rgba(255,255,255,.07);font-size:11px;color:rgba(255,255,255,.5);line-height:1.7;}
    .ls-footer strong{color:#fff;display:block;font-size:11.5px;margin-bottom:1px;}

    /* ── MAIN CONTENT ───────────────────────────────── */
    .content{flex:1;overflow-y:auto;padding:24px 28px 60px;min-width:0;}

    /* ── KPI GRID ───────────────────────────────────── */
    .kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:22px;}
    .kpi{background:#fff;border:1px solid var(--g200);border-radius:12px;padding:14px 18px;box-shadow:var(--xs);}
    .kpi-label{font-size:11px;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
    .kpi-val{font-size:26px;font-weight:800;letter-spacing:-.03em;line-height:1;margin-bottom:3px;}
    .kpi-sub{font-size:11px;color:var(--g400);}

    /* ── SECTION HEAD ───────────────────────────────── */
    .sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .sec-title{font-size:14px;font-weight:700;color:var(--g900);}
    .sec-meta{font-size:12px;color:var(--g400);}

    /* ── FILTER BAR ─────────────────────────────────── */
    .filter-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
    .filter-lbl{font-size:11px;font-weight:600;color:var(--g500);margin-right:2px;}
    .dr-btn{font-size:11px;font-weight:600;padding:4px 11px;border-radius:6px;border:1px solid var(--g200);background:var(--g50);color:var(--g600);cursor:pointer;transition:all .13s;line-height:1.4;font-family:'Inter',sans-serif;white-space:nowrap;}
    .dr-btn:hover{background:var(--g100);border-color:var(--g300);color:var(--g900);}
    .dr-btn.active{background:var(--orange);color:#fff;border-color:var(--orange);}

    /* ── CARDS GRID ─────────────────────────────────── */
    .c-actions{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
    .c-actions-right{display:flex;align-items:center;gap:6px;}
    .cards-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}

    /* ── PROJECT CARD ───────────────────────────────── */
    .proj-card{background:#fff;border:1px solid var(--g200);border-radius:12px;cursor:pointer;transition:box-shadow .15s,transform .1s;box-shadow:0 1px 2px rgba(16,24,40,.05);display:flex;flex-direction:column;position:relative;}
    .proj-card:hover{box-shadow:0 4px 8px -2px rgba(16,24,40,.1),0 2px 4px -2px rgba(16,24,40,.06);transform:translateY(-1px);border-color:var(--g300);}
    .proj-card.selected{border-color:var(--orange);box-shadow:0 0 0 3px rgba(249,99,2,.1),0 4px 8px -2px rgba(16,24,40,.1);}
    .card-body{padding:16px 18px;display:flex;flex-direction:column;flex:1;}
    .card-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;}
    .card-badges{display:flex;gap:4px;flex-wrap:wrap;}
    .card-week{font-size:10px;color:var(--g400);white-space:nowrap;margin-top:2px;flex-shrink:0;}
    .card-name{font-size:13px;font-weight:600;color:var(--g900);line-height:1.4;margin-bottom:2px;}
    .card-owner{font-size:12px;color:var(--g500);margin-bottom:12px;}
    .card-desc{font-size:12px;color:var(--g500);line-height:1.55;margin-bottom:11px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .card-snippet{font-size:12px;color:var(--g600);line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-top:10px;border-top:1px solid var(--g100);margin-top:auto;margin-bottom:10px;}
    .card-area{display:flex;align-items:center;gap:5px;}
    .card-area-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;opacity:.6;}
    .card-area-lbl{font-size:11px;color:var(--g400);}
    .card-upd{position:absolute;top:14px;right:14px;width:6px;height:6px;border-radius:50%;background:var(--orange);display:none;}
    .card-upd.on{display:block;}

    /* ── BADGES — Untitled UI v8 soft style ─────────── */
    .badge{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:6px;font-size:11.5px;font-weight:500;white-space:nowrap;line-height:1.5;}
    .badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0;}
    .bs-green {background:#ECFDF3;color:#027A48;}.bs-green::before{background:#12B76A;}
    .bs-amber {background:#FFFAEB;color:#B54708;}.bs-amber::before{background:#F79009;}
    .bs-red   {background:#FEF3F2;color:#B42318;}.bs-red::before{background:#F04438;}
    .bs-blue  {background:#EFF8FF;color:#175CD3;}.bs-blue::before{background:#2E90FA;}
    .bs-purple{background:#F4F3FF;color:#5925DC;}.bs-purple::before{background:#7A5AF8;}
    .bp-critical{background:#FEF3F2;color:#B42318;}.bp-critical::before{background:#F04438;}
    .bp-high  {background:#FFFAEB;color:#B54708;}.bp-high::before{background:#F79009;}
    .bp-medium{background:#F8F9FC;color:#344054;}.bp-medium::before{background:#98A2B3;}

    /* ── SHARED BULLET LIST & HISTORY SUBHEADS ──────── */
    .bullet-list{list-style:none;padding:0;margin:0;}
    .bullet-list li{font-size:12px;color:var(--g700);line-height:1.6;padding-left:14px;position:relative;margin-bottom:2px;}
    .bullet-list li::before{content:'•';position:absolute;left:2px;color:var(--g400);}
    .bullet-list li.sub{padding-left:28px;color:var(--g500);}
    .bullet-list li.sub::before{content:'○';left:14px;font-size:10px;}
    .bullet-list li.sub2{padding-left:42px;color:var(--g500);}
    .bullet-list li.sub2::before{content:'▪';left:28px;font-size:8px;}
    .hist-sub-section{margin-bottom:8px;}
    .hist-sub-lbl{font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}

    /* ── MODAL ──────────────────────────────────────── */
    .overlay{position:fixed;inset:0;z-index:900;background:rgba(16,24,40,.45);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:16px;}
    .modal{background:#fff;border-radius:14px;width:100%;max-width:640px;max-height:94vh;overflow-y:auto;box-shadow:var(--xl);}
    .mhead{padding:20px 20px 0;display:flex;align-items:flex-start;justify-content:space-between;}
    .mttl{font-size:16px;font-weight:700;}
    .msub{font-size:12px;color:var(--g500);margin-top:2px;}
    .mbody{padding:16px 20px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .mbody .s2{grid-column:1/-1;}
    .mfoot{padding:10px 20px 18px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid var(--g100);}
    .fg{display:flex;flex-direction:column;gap:4px;}
    .fg label{font-size:12px;font-weight:500;color:var(--g700);}
    .fg input,.fg select,.fg textarea{width:100%;padding:7px 10px;border:1px solid var(--g300);border-radius:6px;font:13px 'Inter',sans-serif;color:var(--g900);background:#fff;outline:none;transition:border-color .14s;}
    .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--orange);box-shadow:0 0 0 2px rgba(249,99,2,.1);}
    .fg textarea{resize:vertical;min-height:64px;}
    .rag-opts{display:flex;gap:5px;}
    .rag-opt{flex:1;padding:6px 4px;border:2px solid var(--g200);border-radius:6px;background:#fff;cursor:pointer;text-align:center;font:500 11px 'Inter',sans-serif;color:var(--g500);transition:all .13s;}
    .rag-opt.sg{border-color:var(--green);background:#ECFDF3;color:#027A48;}
    .rag-opt.sa{border-color:var(--amber);background:#FFFAEB;color:#B54708;}
    .rag-opt.sr{border-color:var(--red);background:#FEF3F2;color:#B42318;}

    /* ── TOAST ──────────────────────────────────────── */
    .toast{position:fixed;bottom:18px;right:18px;z-index:9999;background:var(--g900);color:#fff;padding:9px 13px;border-radius:7px;font:500 12px 'Inter',sans-serif;box-shadow:var(--lg);transform:translateY(50px);opacity:0;transition:all .2s;pointer-events:none;}
    .toast.on{transform:none;opacity:1;}

    /* ── Search bar ──────────────────────────────── */
    .srch-wrap{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--g300);border-radius:7px;padding:5px 10px;min-width:220px;transition:border-color .14s;}
    .srch-wrap:focus-within{border-color:var(--orange);box-shadow:0 0 0 2px rgba(249,99,2,.08);}
    .srch-input{border:none;outline:none;font:13px 'Inter',sans-serif;color:var(--g900);background:transparent;flex:1;min-width:0;}
    .srch-input::placeholder{color:var(--g400);}
    /* ── Staleness & milestone ───────────────────── */
    .stale-badge{font-size:10px;font-weight:600;color:var(--g400);background:var(--g100);padding:1px 7px;border-radius:10px;border:1px solid var(--g200);}
    .ms-chip{font-size:10.5px;color:#175CD3;background:#EFF8FF;border:1px solid #B2DDFF;padding:2px 8px;border-radius:10px;display:inline-flex;align-items:center;gap:3px;}
    /* ── Digest modal ────────────────────────────── */
    .digest-overlay{position:fixed;inset:0;z-index:960;background:rgba(16,24,40,.45);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:16px;}
    .digest-modal{background:#fff;border-radius:14px;width:100%;max-width:700px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--xl);}
    .digest-body{flex:1;overflow-y:auto;padding:16px 24px 24px;}
    .digest-text{font:12.5px/1.8 'Courier New',monospace;color:var(--g800);white-space:pre-wrap;word-break:break-word;background:var(--g50);border-radius:8px;padding:16px;}
    /* ── PORTFOLIO VIEW ─────────────────────────────── */
    .pf-row-item{padding:10px 0;cursor:pointer;transition:opacity .12s;}
    .pf-row-item:hover{opacity:.75;}

    @media print{.topbar,.edit-banner,.lsidebar,.btn{display:none!important;}.shell{height:auto;display:block;}.content{padding:0;}}

    /* ── LEADERSHIP DETAIL MODAL ── */
    .ld-overlay{position:fixed;inset:0;z-index:950;background:rgba(16,24,40,.45);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px;}
    .ld-modal{background:#fff;border-radius:16px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 24px -4px rgba(16,24,40,.14),0 8px 8px -4px rgba(16,24,40,.06);display:flex;flex-direction:column;}
    .ld-head{padding:24px 26px 20px;border-bottom:1px solid var(--g200);}
    .ld-meta-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
    .ld-area-tag{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;color:#fff;letter-spacing:.03em;}
    .ld-proj-name{font-size:21px;font-weight:700;color:var(--g900);line-height:1.2;margin:11px 0 4px;}
    .ld-proj-sub{font-size:12.5px;color:var(--g500);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .ld-objective{margin-top:14px;font-size:13px;color:var(--g600);line-height:1.65;padding-left:12px;border-left:2px solid var(--g200);}
    .ld-body{padding:22px 26px;flex:1;}
    /* typography-first section blocks */
    .ld-block{margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid var(--g100);}
    .ld-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
    .ld-sec-lbl{font-size:10px;font-weight:700;color:var(--g900);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px;display:flex;align-items:center;gap:5px;}
    .ld-watch .ld-sec-lbl{color:#B54708;}
    .ld-empty{padding:40px 26px;text-align:center;}
    .ld-empty-icon{font-size:30px;margin-bottom:10px;}
    .ld-empty-txt{font-size:13px;color:var(--g500);line-height:1.6;}
    .ld-foot{padding:12px 26px 16px;border-top:1px solid var(--g100);flex-shrink:0;}
    /* prev updates accordion */
    .ld-hist{margin-top:18px;border-top:1px solid var(--g100);padding-top:16px;}
    .ld-hist-lbl{font-size:10px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
    .ld-hi{border:1px solid var(--g200);border-radius:8px;margin-bottom:6px;overflow:hidden;}
    .ld-hi-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;background:var(--g50);font-size:12px;font-weight:600;color:var(--g700);}
    .ld-hi-head:hover{background:var(--g100);}
    .ld-hi-body{display:none;padding:12px 14px;background:#fff;}
    .ld-hi-body.open{display:block;}
    /* leadership modal — world-class enhancements */
    .ld-exec-summary{margin-top:14px;font-size:13px;color:var(--g700);line-height:1.7;padding:12px 16px;background:var(--g50);border-radius:8px;border-left:3px solid var(--g300);}
    .ld-trend{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap;}
    .ld-trend-up{background:#ECFDF3;color:#027A48;}
    .ld-trend-stable{background:#F8F9FC;color:#344054;}
    .ld-trend-down{background:#FEF3F2;color:#B42318;}
    .ld-confidence{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;padding:2px 8px;border-radius:10px;}
    .ld-conf-high{background:#ECFDF3;color:#027A48;}
    .ld-conf-medium{background:#FFFAEB;color:#B54708;}
    .ld-conf-low{background:#FEF3F2;color:#B42318;}
    .ld-progress-wrap{margin-top:14px;padding:14px 16px;background:#fff;border:1px solid var(--g200);border-radius:10px;}
    .ld-progress-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;}
    .ld-progress-nums{font-size:15px;font-weight:700;color:var(--g900);}
    .ld-progress-pct{font-size:12px;font-weight:600;color:var(--g500);}
    .ld-progress-track{height:4px;background:var(--g100);border-radius:4px;overflow:hidden;margin-bottom:6px;}
    .ld-progress-fill{height:100%;border-radius:4px;transition:width .4s;}
    .ld-progress-sub{font-size:11px;color:var(--g400);}
    .ld-decisions{margin-bottom:22px;padding:14px 16px;background:#FFFBF5;border:1px solid #FEC84B;border-radius:10px;}
    .ld-decisions-hdr{font-size:10px;font-weight:700;color:#B54708;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
    /* pm update modal — new fields */
    .pu-conf-btn{padding:7px 14px;border:1px solid var(--g200);border-radius:6px;background:var(--g50);font:500 12px 'Inter',sans-serif;color:var(--g600);cursor:pointer;transition:all .15s;}
    .pu-conf-btn:hover{background:var(--g100);}
    .pu-conf-btn[data-conf="high"].active{border-color:#12B76A;background:#ECFDF3;color:#027A48;font-weight:600;}
    .pu-conf-btn[data-conf="medium"].active{border-color:#F79009;background:#FFFAEB;color:#B54708;font-weight:600;}
    .pu-conf-btn[data-conf="low"].active{border-color:#F04438;background:#FEF3F2;color:#B42318;font-weight:600;}
    .pu-sec-decisions .pu-sec-lbl{color:#175CD3;}
    .pu-sec-decisions .pu-item-dot{background:#2E90FA;}

    /* ── PM UPDATE MODAL ── */
    .pu-overlay{position:fixed;inset:0;z-index:960;background:rgba(16,24,40,.45);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px;}
    .pu-modal{background:#fff;border-radius:16px;width:100%;max-width:700px;max-height:92vh;overflow:hidden;box-shadow:0 20px 24px -4px rgba(16,24,40,.14),0 8px 8px -4px rgba(16,24,40,.06);display:flex;flex-direction:column;}
    .pu-head{padding:20px 24px 16px;border-bottom:1px solid var(--g200);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;}
    .pu-title{font-size:16px;font-weight:700;color:var(--g900);}
    .pu-step-lbl{font-size:11px;color:var(--g400);font-weight:500;margin-top:3px;}
    .pu-body{padding:22px 24px;flex:1;overflow-y:auto;}
    .pu-foot{padding:14px 24px 18px;border-top:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .pu-field-lbl{font-size:11.5px;font-weight:600;color:var(--g700);margin-bottom:6px;}
    .pu-select,.pu-textarea{width:100%;box-sizing:border-box;border:1px solid var(--g300);border-radius:8px;font:13px/1.5 'Inter',sans-serif;color:var(--g900);background:#fff;outline:none;transition:border-color .15s,box-shadow .15s;}
    .pu-select{padding:8px 12px;height:38px;cursor:pointer;}
    .pu-textarea{padding:10px 12px;resize:vertical;min-height:180px;line-height:1.6;}
    .pu-select:focus,.pu-textarea:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(249,99,2,.08);}
    .pu-method-row{display:flex;gap:8px;margin:18px 0;}
    .pu-method-btn{flex:1;padding:11px 14px;border:1px solid var(--g200);border-radius:8px;background:var(--g50);font:500 12.5px/1 'Inter',sans-serif;color:var(--g600);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px;}
    .pu-method-btn.active{border-color:var(--orange);background:#FFF4EE;color:var(--orange);font-weight:600;}

function load() {
  try {
    const s = localStorage.getItem(KEY);
    if (s) {
      const d = JSON.parse(s);
      // migrate: remove ET projects, fill owner from AREA_PM if blank
      const validAreas = new Set(AREAS.map(a => a.id));
      d.projects = d.projects
        .filter(p => validAreas.has(p.area))
        .map(p => ({...p, owner: p.owner || AREA_PM[p.area] || ''}));
      // seed sample updates if none exist
      if (!d.updates || !Object.keys(d.updates).length) d.updates = SEED_UPDATES;
      d.resolvedDecisions = d.resolvedDecisions || {};
      return d;
    }
  } catch {}
  // Fresh load: apply sample status overrides and seed updates
  const projects = SEED_PROJECTS.map(p => {
    const overrides = { na06:'at-risk', dc04:'at-risk', dn17:'on-track', uc04:'at-risk' };
    return {...p, owner: AREA_PM[p.area]||'', status: overrides[p.id]||p.status };
  });
  return { projects, updates: SEED_UPDATES, updated: new Date().toISOString(), resolvedDecisions: {} };
}
function persist() {
  db.updated = new Date().toISOString();
  localStorage.setItem(KEY, JSON.stringify(db));
  renderChip();
}
function renderChip() {
  const d = new Date(db.updated);
  document.getElementById('updChip').textContent = 'Updated ' + d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}

        <div class="kpi-sub">${s.sub}</div>
      </div>`).join('')}</div>`;
}
function pct(n, total) { return total ? Math.round(n/total*100) : 0; }

function buildDonut(segments, total) {
  if (!total) return '<svg viewBox="0 0 80 80"><circle cx="40" cy="40" r="28" fill="none" stroke="#E4E7EC" stroke-width="10"/></svg>';
  const R=28, C=2*Math.PI*R, cx=40, cy=40;
  let offset = 0;
  const paths = segments.map(s => {
    const len = (s.val/total)*C;
    if (!len) return '';
    const p = `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${s.col}" stroke-width="10" stroke-dasharray="${len} ${C}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset += len;
    return p;
  }).join('');
  return `<svg viewBox="0 0 80 80"><circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#E4E7EC" stroke-width="10"/>${paths}</svg>`;
}

function renderAreas() {
  const allPill = `<button class="dr-btn${areaFilter==='all'?' active':''}" onclick="setArea('all',this)">All Product Areas</button>`;
  const btns = allPill + AREAS.map(a =>
    `<button class="dr-btn${areaFilter===a.id?' active':''}" onclick="setArea('${a.id}',this)">${a.label}</button>`
  ).join('');

  let projs = areaFilter === 'all' ? db.projects : db.projects.filter(p => p.area === areaFilter);
  if (statFilter) projs = projs.filter(p => p.status === statFilter);
  if (pmFilter) projs = projs.filter(p => p.owner === pmFilter);
  if (prioFilter) projs = projs.filter(p => p.priority === prioFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    projs = projs.filter(p =>
      (p.name||'').toLowerCase().includes(q) ||
      (p.owner||'').toLowerCase().includes(q) ||
      (p.objective||'').toLowerCase().includes(q)
    );
  }
  const PRIO_ORDER = {'Critical':0,'High':1,'Medium':2};
  projs = projs.slice().sort((a,b) => (PRIO_ORDER[a.priority]??3) - (PRIO_ORDER[b.priority]??3));

  const areaLabel = areaFilter === 'all' ? 'All Areas' : (AREAS.find(a=>a.id===areaFilter)?.label || '');
  const prioLabel = prioFilter ? ` · ${prioFilter} Priority` : '';
  const secTitle = searchQuery
    ? `${projs.length} result${projs.length!==1?'s':''} for "${esc(searchQuery)}"`
    : statFilter
      ? `${SC[statFilter]?.label || ''}${prioLabel} — ${projs.length} project${projs.length!==1?'s':''}`
      : `${areaLabel}${prioLabel} — ${projs.length} initiative${projs.length!==1?'s':''}`;

  const cards = projs.length
    ? projs.map(p => projCard(p)).join('')
    : `<div style="grid-column:1/-1;padding:32px;text-align:center;font-size:13px;color:var(--g400)">No projects${searchQuery?' matching "'+esc(searchQuery)+'"':statFilter?' matching this filter':''} found.</div>`;

  const pms = [...new Set(db.projects.map(p=>p.owner||'').filter(Boolean))].sort();
  const pmPillsHtml = pms.length > 1 ? `
    <div class="filter-bar" style="margin-bottom:10px">
      <span class="filter-lbl">Project Manager</span>
      <button class="dr-btn${!pmFilter?' active':''}" onclick="setPmFilter(null,this)">All PMs</button>

    </div>` : '';

  document.getElementById('areas').innerHTML = `
    ${pmPillsHtml}
    <div class="filter-bar">
      <span class="filter-lbl">Product Area</span>
      ${btns}
    </div>
    <div class="sec-head">
      <span class="sec-title">${secTitle}</span>
    </div>
    <div class="cards-wrap">${cards}</div>`;
}

  }).join('') || `<div style="padding:24px 0;text-align:center;font-size:12px;color:var(--g400)">No updates yet</div>`;

  // ── Heatmap ──────────────────────────────────────────────────────────────────
  const HM_COLS = [

    { id:'at-risk',   label:'At Risk',   bg:'#FFFAEB', col:'#B54708' },

}
const fDate = d => { if(!d) return '—'; return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };
const fDateShort = d => { if(!d) return ''; return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };

function buildRing(pct, color) {
  const r=28, C=2*Math.PI*r, len=(pct/100)*C;
  return `<svg viewBox="0 0 68 68" style="transform:rotate(-90deg)">
    <circle cx="34" cy="34" r="${r}" fill="none" stroke="#E4E7EC" stroke-width="7"/>
    <circle cx="34" cy="34" r="${r}" fill="none" stroke="${color}" stroke-width="7"
      stroke-dasharray="${len} ${C}" stroke-linecap="round"/>
  </svg>`;
}

function projCard(p) {
  const a = AREAS.find(x => x.id === p.area) || AREAS[0];
  const sc = SC[p.status] || SC['on-track'];
  const updArr = (db.updates||{})[p.id] || [];
  const latest = updArr[0] || null;
  const isSel = selectedId === p.id;
  const pc = PC[p.priority] || '';

  const cardUpdArr = (db.updates||{})[p.id]||[];
  const cardLatest = cardUpdArr[0]||null;
  const daysSince = cardLatest?.weekOf
    ? Math.floor((Date.now()-new Date(cardLatest.weekOf+'T12:00:00').getTime())/86400000)
    : 999;
  const isStale = daysSince > 14;
  const hasMilestone = p.milestoneLabel && p.milestoneDate;

  const weekLabel = latest && latest.weekOf
    ? 'Week of ' + fDateShort(latest.weekOf)
    : '';


  return `
  <div class="proj-card${isSel?' selected':''}" id="card-${p.id}"
       onclick="selectProj('${p.id}')">
    <div class="card-body">
      <div class="card-row1">

          ${pc ? `<span class="badge ${pc}">${esc(p.priority)} Priority</span>` : ''}

      </div>

        <span class="card-area-dot" style="background:${a.color}"></span>
        <span class="card-area-lbl">${esc(a.label)}</span>
      </div>
      <div class="card-name">${esc(p.name)}</div>
      <div class="card-owner">${esc(p.owner || '—')}</div>
      ${p.objective ? `<div class="card-desc">${esc(p.objective)}</div>` : '<div style="flex:1"></div>'}
      ${hasMilestone ? `<div style="padding-top:6px"><span class="ms-chip">📅 ${esc(p.milestoneLabel)} · ${fDateShort(p.milestoneDate)}</span></div>` : ''}
      <div style="padding-top:8px;font-size:10.5px;color:var(--g400)">${cardLatest?.weekOf ? 'Last update · ' + fDateShort(cardLatest.weekOf) : 'No updates yet'}</div>

}

function openModal(id, aId) {

  const p = id ? db.projects.find(x => x.id === id) : null;

  document.getElementById('fo').value   = p?.owner   || '';
  document.getElementById('fa').value   = p?.area    || aId || 'dn';
  document.getElementById('fd').value   = p?.dept    || '';
  document.getElementById('fcl').value  = p?.clarityId || '';
  document.getElementById('fpr').value  = p?.priority  || 'High';
  document.getElementById('fs').value   = p?.status  || 'on-track';
  document.getElementById('fp').value   = p?.pct     ?? '';
  document.getElementById('fsd').value  = p?.start   || '';
  document.getElementById('fed').value  = p?.end     || '';
  document.getElementById('fb').value   = p?.budget  || 'green';
  document.getElementById('fsc').value  = p?.scope   || 'green';
  document.getElementById('fobj').value = p?.objective|| '';
  document.getElementById('fnote').value= p?.note    || '';
  document.getElementById('frisks').value=p?.risks   || '';
  document.getElementById('fnext').value= p?.next    || '';
  hiRag('b', p?.budget||'green'); hiRag('s', p?.scope||'green');
  document.getElementById('overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('fn').focus(), 40);
}
function closeModal() { document.getElementById('overlay').style.display='none'; editId=null; editArea=null; }
function saveProject() {
  const name = document.getElementById('fn').value.trim();
  if (!name) { toast('Project name required'); document.getElementById('fn').focus(); return; }
  const obj = {
    id: editId || 'p'+Date.now(),
    name,
    owner:     document.getElementById('fo').value.trim(),
    area:      document.getElementById('fa').value,
    dept:      document.getElementById('fd').value.trim(),
    clarityId: document.getElementById('fcl').value.trim(),
    priority:  document.getElementById('fpr').value,
    status:    document.getElementById('fs').value,
    pct:       Math.min(100,Math.max(0,parseInt(document.getElementById('fp').value)||0)),
    start:     document.getElementById('fsd').value,
    end:       document.getElementById('fed').value,
    budget:    document.getElementById('fb').value || 'green',
    scope:     document.getElementById('fsc').value || 'green',
    objective: document.getElementById('fobj').value.trim(),
    note:      document.getElementById('fnote').value.trim(),
    risks:     document.getElementById('frisks').value.trim(),
    next:      document.getElementById('fnext').value.trim(),
  };
  if (editId) { const i=db.projects.findIndex(x=>x.id===editId); if(i>=0) db.projects[i]=obj; toast('Updated'); }
  else { db.projects.push(obj); toast('Project added'); }
  persist(); closeModal(); renderAll();
}
function delProj(id) {
  if (!confirm('Delete this project?')) return;
  db.projects = db.projects.filter(x => x.id !== id);
  if (db.updates) delete db.updates[id];
  if (selectedId === id) selectedId = null;
  persist(); renderAll(); toast('Deleted');
}
function pickRag(f, v) { document.getElementById('f'+f).value=v; hiRag(f,v); }
function hiRag(f, v) {
  const m = {green:'sg',amber:'sa',red:'sr'};
  document.querySelectorAll(`#${f}Opts .rag-opt`).forEach(b => { b.className='rag-opt'+(b.dataset.v===v?' '+m[v]:''); });
}

// ─── Import ───────────────────────────────────────────────────────────────────
function importJSON(e) {
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try {
      const d=JSON.parse(ev.target.result);
      if(!Array.isArray(d.projects))throw 0;
      db=d; persist(); renderAll(); toast('Imported '+d.projects.length+' projects');
    } catch { toast('Import failed — invalid file'); }
  };
  r.readAsText(f); e.target.value='';
}

let _tt;
function toast(m) {
  const e=document.getElementById('toast'); e.textContent=m; e.classList.add('on');

}

function renderBullets(val) {
  if (!val || !val.trim()) return '<span style="color:var(--g400);font-style:italic">Nothing entered</span>';
  const items = val.split('\n').filter(l => l.trim()).map(l => {
    const raw = l.trimEnd(), indent = raw.length - raw.trimStart().length;
    const text = esc(raw.replace(/^[\s\-•*]+/, '').trim());
    const cls = indent >= 4 ? 'sub2' : indent >= 2 ? 'sub' : '';
    return `<li class="${cls}">${text}</li>`;
  }).join('');
  return `<ul class="bullet-list">${items}</ul>`;
}

function renderDecisionItems(val) {
  if (!val || !val.trim()) return '';
  const lines = val.split('\n').filter(l => l.trim());
  return `<div>${lines.map((l, i) => {
    const raw = l.replace(/^[\s\-•*]+/, '').trim();
    const ownerMatch = raw.match(/\(([^)]+)\)$/);
    const owner = ownerMatch ? ownerMatch[1] : null;
    const text  = owner ? raw.slice(0, raw.lastIndexOf('(')).trim() : raw;
    const sep   = i < lines.length - 1 ? 'border-bottom:1px solid rgba(254,200,75,.25);' : '';
    return `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:8px 0;${sep}">
      <div style="display:flex;align-items:flex-start;gap:8px;flex:1;min-width:0">
        <span style="color:#F79009;font-weight:700;flex-shrink:0;line-height:1.5">›</span>
        <span style="font-size:12.5px;color:var(--g800);line-height:1.5">${esc(text)}</span>
      </div>
      ${owner ? `<span style="font-size:11px;font-weight:600;color:#92400E;background:rgba(254,200,75,.28);padding:2px 9px;border-radius:10px;white-space:nowrap;flex-shrink:0">${esc(owner)}</span>` : ''}
    </div>`;
  }).join('')}</div>`;
}

function strHash(s) { let h=5381; for(let i=0;i<s.length;i++) h=(h<<5)+h+s.charCodeAt(i)|0; return Math.abs(h).toString(36); }

function toggleDecisionResolved(projId, textHash) {
  if (!db.resolvedDecisions) db.resolvedDecisions = {};
  const key = projId + '::' + textHash;
  if (db.resolvedDecisions[key]) delete db.resolvedDecisions[key];
  else db.resolvedDecisions[key] = true;
  persist();
  showLeadershipDetail(projId);
}

function renderDecisionItemsToggleable(val, projId) {
  if (!val || !val.trim()) return '';
  const lines = val.split('\n').filter(l => l.trim());
  if (!lines.length) return '';
  const resolved = db.resolvedDecisions || {};
  return `<div>${lines.map((l, i) => {
    const raw = l.replace(/^[\s\-•*]+/, '').trim();
    const ownerMatch = raw.match(/\(([^)]+)\)$/);
    const owner = ownerMatch ? ownerMatch[1] : null;
    const text  = owner ? raw.slice(0, raw.lastIndexOf('(')).trim() : raw;
    const hash  = strHash(raw);
    const key   = projId + '::' + hash;
    const isDone = !!resolved[key];
    const sep   = i < lines.length - 1 ? 'border-bottom:1px solid rgba(254,200,75,.25);' : '';
    return `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;padding:8px 0;${sep}${isDone?'opacity:.5':''}">
      <div style="display:flex;align-items:flex-start;gap:8px;flex:1;min-width:0">
        <span style="color:#F79009;font-weight:700;flex-shrink:0;line-height:1.5">›</span>
        <span style="font-size:12.5px;color:var(--g800);line-height:1.5;${isDone?'text-decoration:line-through':''}">${esc(text)}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        ${owner ? `<span style="font-size:11px;font-weight:600;color:#92400E;background:rgba(254,200,75,.28);padding:2px 9px;border-radius:10px;white-space:nowrap">${esc(owner)}</span>` : ''}
        <button onclick="toggleDecisionResolved('${projId}','${hash}')" title="${isDone?'Mark open':'Mark resolved'}" style="border:none;background:${isDone?'#ECFDF3':'var(--g100)'};color:${isDone?'#027A48':'var(--g500)'};border-radius:5px;padding:2px 7px;font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap">${isDone?'✓ Done':'Resolve'}</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function showLeadershipDetail(id) {
  const p = db.projects.find(x => x.id === id); if (!p) return;
  const a = AREAS.find(x => x.id === p.area) || AREAS[0];
  const sc = SC[p.status] || SC['on-track'];
  const pc = PC[p.priority] || '';
  const updArr = (db.updates||{})[id] || [];
  const latest = updArr[0] || null;
  const history = updArr.slice(1, 6);

  const ownerStr = p.owner ? esc(p.owner) : '—';
  const weekStr  = latest && latest.weekOf ? 'Week of ' + fDateShort(latest.weekOf) : '';
  const msStr = p.milestoneLabel && p.milestoneDate
    ? '🎯 ' + esc(p.milestoneLabel) + ' · ' + fDateShort(p.milestoneDate)
    : '';

  // ── Status Trend ──────────────────────────────────────────────────────────
  const STATUS_RANK = {'on-track':3,'complete':4,'at-risk':2,'off-track':1,'on-hold':2};
  const curSnap  = latest ? (latest.statusSnap || p.status) : p.status;
  const prevSnap = history.length ? (history[0].statusSnap || null) : null;
  let trendHtml = '';
  if (prevSnap) {
    const curR  = STATUS_RANK[curSnap]  || 2;
    const prevR = STATUS_RANK[prevSnap] || 2;
    const prevLabel = SC[prevSnap]?.label || prevSnap;
    if      (curR > prevR) trendHtml = `<span class="ld-trend ld-trend-up">↑ Improved from ${prevLabel}</span>`;
    else if (curR < prevR) trendHtml = `<span class="ld-trend ld-trend-down">↓ Was ${prevLabel}</span>`;
    else                   trendHtml = `<span class="ld-trend ld-trend-stable">→ Stable</span>`;
  }

  // ── Executive Summary ─────────────────────────────────────────────────────
  let summaryHtml = '';
  if (latest && latest.summary && latest.summary.trim()) {
    summaryHtml = `<div class="ld-exec-summary">${esc(latest.summary)}</div>`;
  }

  // ── Progress Bar ──────────────────────────────────────────────────────────
  let progressHtml = '';
  if (latest && latest.progressCurrent && latest.progressTotal) {
    const cur = parseFloat(latest.progressCurrent);
    const tot = parseFloat(latest.progressTotal);
    const pctVal = tot > 0 ? Math.round((cur / tot) * 100) : 0;
    const unit = latest.progressUnit || 'complete';
    const PROG_FILL = {'on-track':'#12B76A','complete':'#12B76A','at-risk':'#F79009','off-track':'#F04438','on-hold':'#98A2B3'};
    const fillColor = PROG_FILL[p.status] || '#12B76A';
    const targetStr = p.end ? 'Target: ' + fDateShort(p.end) : '';
    progressHtml = `
    <div class="ld-progress-wrap">
      <div class="ld-progress-top">
        <span class="ld-progress-nums">${cur.toLocaleString()} <span style="font-size:12px;font-weight:400;color:var(--g400)">/ ${tot.toLocaleString()} ${esc(unit)}</span></span>
        <span class="ld-progress-pct">${pctVal}%</span>
      </div>
      <div class="ld-progress-track">
        <div class="ld-progress-fill" style="width:${pctVal}%;background:${fillColor}"></div>
      </div>
      ${targetStr ? `<div class="ld-progress-sub">${targetStr}</div>` : ''}
    </div>`;
  }

  // ── Needs Your Attention ──────────────────────────────────────────────────
  let decisionsHtml = '';
  if (latest && latest.decisions && latest.decisions.trim()) {
    decisionsHtml = `
    <div class="ld-decisions">
      <div class="ld-decisions-hdr">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 1.5L1 13.5h14L8 1.5z" stroke="#B54708" stroke-width="1.5" stroke-linejoin="round"/><line x1="8" y1="6" x2="8" y2="9.5" stroke="#B54708" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="11.5" r=".8" fill="#B54708"/></svg>
        Needs Your Attention
      </div>
      ${renderDecisionItemsToggleable(latest.decisions, id)}
    </div>`;
  }

  // ── Body ──────────────────────────────────────────────────────────────────
  let bodyHtml = '';
  if (latest) {
    bodyHtml += decisionsHtml;

    bodyHtml += `
    <div class="ld-block">
      <div class="ld-sec-lbl">This Week</div>
      ${renderBullets(latest.accomp)}
    </div>`;

    if (latest.upcoming && latest.upcoming.trim()) {
      bodyHtml += `
      <div class="ld-block">
        <div class="ld-sec-lbl">Upcoming Work</div>
        ${renderBullets(latest.upcoming)}
      </div>`;
    }

    const watchRaw = [latest.risks, latest.issues].filter(v => v && v.trim()).join('\n');
    if (watchRaw.trim()) {
      bodyHtml += `
      <div class="ld-block ld-watch">
        <div class="ld-sec-lbl">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M8 1.5L1 13.5h14L8 1.5z" stroke="#B54708" stroke-width="1.5" stroke-linejoin="round"/><line x1="8" y1="6" x2="8" y2="9.5" stroke="#B54708" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="11.5" r=".8" fill="#B54708"/></svg>
          Watch Items
        </div>
        ${renderBullets(watchRaw)}
      </div>`;
    }
  } else {
    bodyHtml = `
    <div class="ld-empty">
      <div class="ld-empty-icon">📋</div>
      <div class="ld-empty-txt">No weekly update has been entered for this project yet.</div>
    </div>`;
  }

  // ── History accordion ─────────────────────────────────────────────────────
  let histHtml = '';
  if (history.length) {
    histHtml = `<div class="ld-hist">
      <div class="ld-hist-lbl">Previous Updates</div>
      ${history.map((u, i) => {
        const label = (u.weekOf ? 'Week of ' + fDateShort(u.weekOf) : 'Entry') + (u.pm ? ' · ' + esc(u.pm) : '');
        const watchH = [u.risks, u.issues].filter(v => v && v.trim()).join('\n');
        const hSecs = [
          { label:'This Week',   val: u.accomp   },
          { label:'Upcoming Work', val: u.upcoming  },
          { label:'Watch Items', val: watchH      },
        ].filter(s => s.val && s.val.trim()).map(s =>
          `<div class="hist-sub-section"><div class="hist-sub-lbl">${s.label}</div>${renderBullets(s.val)}</div>`
        ).join('');
        return `
        <div class="ld-hi">
          <div class="ld-hi-head" onclick="ldToggleHist('ldhi${i}')">
            <span>${label}</span>
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="ld-hi-body" id="ldhi${i}">${hSecs || '<span style="color:var(--g400);font-size:12px;font-style:italic">No content</span>'}</div>
        </div>`;
      }).join('')}
    </div>`;
  }

  // ── Full modal HTML ───────────────────────────────────────────────────────
  const html = `
  <div class="ld-overlay" id="ldOverlay" onclick="if(event.target===document.getElementById('ldOverlay'))closeLdModal()">
    <div class="ld-modal">

      <!-- Header -->
      <div class="ld-head">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div class="ld-meta-row">
            <span class="ld-area-tag" style="background:var(--orange)">${esc(a.label)}</span>
            <span class="badge ${sc.bc}">${sc.label}</span>
            ${trendHtml}
            ${pc ? `<span class="badge ${pc}">${esc(p.priority)} Priority</span>` : ''}
          </div>
          <button onclick="closeLdModal()" style="width:28px;height:28px;border:none;border-radius:6px;background:var(--g100);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--g500);flex-shrink:0">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="ld-proj-name">${esc(p.name)}</div>
        <div class="ld-proj-sub">
          <span>${ownerStr}</span>
          ${weekStr ? `<span style="color:var(--g300)">·</span><span>${weekStr}</span>` : ''}
          ${msStr ? `<span style="color:var(--g300)">·</span><span style="color:#175CD3;font-weight:500">${msStr}</span>` : ''}
        </div>
        ${p.objective ? `<div class="ld-objective">${esc(p.objective)}</div>` : ''}
        ${summaryHtml}
        ${progressHtml}
      </div>

      <!-- Body -->
      <div class="ld-body">
        ${bodyHtml}
        ${histHtml}
      </div>

      <!-- Footer -->
      <div class="ld-foot" style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:11.5px;color:var(--g400)">${latest ? 'Last updated ' + fDateShort(latest.weekOf) : 'No updates yet'}</span>
        <button class="btn btn-ghost" onclick="printLdModal('${p.id}')" style="font-size:11px;padding:4px 10px">
          <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
          Print
        </button>
      </div>

    </div>
  </div>`;

  let container = document.getElementById('ldModal');
  if (!container) {
    container = document.createElement('div');
    container.id = 'ldModal';
    document.body.appendChild(container);
  }
  container.innerHTML = html;
}

function _parseCopilotNotes(raw) {
  const out = { accomp:[], upcoming:[], watch:[], decisions:[] };
  const lines = raw.split('\n').map(l => l.trim()).filter(l => l.length > 3);

  const secRx = {
    accomp:    /^(?:#+\s*|[*_]{1,2})(this week|accomplish|complet|done|status|deliver|summary)/i,
    upcoming:  /^(?:#+\s*|[*_]{1,2})(upcoming|next|planned|milestone|action item|to[ -]?do|coming up)/i,
    watch:     /^(?:#+\s*|[*_]{1,2})(risk|issue|watch|blocker|concern|impediment|escalat)/i,
    decisions: /^(?:#+\s*|[*_]{1,2})(decision|approval|pending approval|action required|needs.*approval|leadership)/i,
  };

  let section = null;
  lines.forEach(line => {
    for (const [s, rx] of Object.entries(secRx)) { if (rx.test(line)) { section = s; return; } }
    if (line.length < 5) return;
    const clean = line.replace(/^(\d+[.)]\s+|[-•*→✓✔▸·]\s*)/, '').trim();
    if (!clean || clean.length < 4) return;

    const person = _extractName(clean);
    const due    = _extractDate(clean);
    const item   = { text:clean, person, due, id:_uid() };

    if (section) { out[section].push(item); return; }
    const decisionRx = /(?:decision|approval)\s+(?:needed|required)|pending.*approv|requires.*sign.?off|awaiting.*approv|vp.*approv|escalat.*approv/i;
    const riskRx     = /risk|issue|blocker|concern|delay|behind|stuck|problem|escalat|off.?track|challeng|impediment/i;
    const upRx       = /\bwill\b|plan to|next week|upcoming|schedule|target.*\d|deploy|release|mileston|prepar|begin next|action.*required/i;
    const doneRx     = /complet|finish|done|delivered|deploy|launched|closed|resolved|signed|approved|released|migrat/i;
    if (decisionRx.test(clean))  out.decisions.push(item);
    else if (riskRx.test(clean)) out.watch.push(item);
    else if (doneRx.test(clean)) out.accomp.push(item);
    else if (upRx.test(clean))   out.upcoming.push(item);
    else                         out.accomp.push(item);
  });

  ['accomp','upcoming','watch','decisions'].forEach(s => {
    if (!out[s].length) out[s].push({ text:'', person:'', due:'', id:_uid() });
  });
  return out;
}

function _extractName(s) {
  const m = s.match(/(?:owner|responsible|assigned to|lead|pm)\s*[:\-]\s*([A-Z][a-z]+ [A-Z][a-z]+)/i);
  if (m) return m[1];
  const p = s.match(/\(([A-Z][a-z]+ [A-Z][a-z]+)\)/);
  return p ? p[1] : '';
}
function _extractDate(s) {
  const rx = /(?:due|by|target|eod|eow|deadline)\s*[:\-]?\s*((?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\.?\s+\d{1,2}(?:,?\s*\d{4})?|\d{1,2}\/\d{1,2}(?:\/\d{2,4})?|(?:next\s+)?(?:Mon|Tue|Wed|Thu|Fri|Monday|Tuesday|Wednesday|Thursday|Friday)|end\s+of\s+(?:week|month|quarter|sprint))/i;
  const m = s.match(rx);
  if (m) return m[1];
  const dm = s.match(/\b((?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\.?\s+\d{1,2})\b/);
  return dm ? dm[1] : '';
}

function puAddItem(section) {
  if (!puState) return;
  puState.items[section].push({ text:'', person:'', due:'', id:_uid() });
  _renderPU();
  setTimeout(() => {
    const list = document.querySelectorAll(`.pu-sec .pu-item`);
    const last = list[list.length - 1];
    if (last) last.querySelector('.pu-item-txt')?.focus();
  }, 40);
}

function puRemoveItem(section, idx) {
  if (!puState) return;
  puState.items[section].splice(idx, 1);
  if (!puState.items[section].length)
    puState.items[section].push({ text:'', person:'', due:'', id:_uid() });
  _renderPU();
}

function puGoBack() {
  if (!puState) return;
  puState.step = 1;
  puState.parseSuccess = false;
  _renderPU();
}

function puSetRag(field, val, btn) {
  if (!puState) return;
  puState['project' + field] = val;
  const m = {green:'sg', amber:'sa', red:'sr'};
  btn.closest('.rag-opts').querySelectorAll('.rag-opt').forEach(b => {
    b.className = 'rag-opt' + (b.dataset.v === val ? ' ' + m[val] : '');
  });
}

function postPMUpdate() {
  if (!puState) return;
  const p = db.projects.find(x => x.id === puState.projectId);
  if (!p) { toast('Project not found'); return; }

  const toText = arr => arr
    .filter(i => i.text && i.text.trim())
    .map(i => {
      let line = i.text.trim();
      const meta = [i.person && i.person.trim(), i.due && i.due.trim()].filter(Boolean);
      if (meta.length) line += ' (' + meta.join(' · ') + ')';
      return line;
    }).join('\n');

  // Write all project fields back to the record
  const projIdx = db.projects.findIndex(x => x.id === puState.projectId);
  if (projIdx >= 0) {
    const proj = db.projects[projIdx];
    if ((puState.projectName||'').trim()) proj.name = puState.projectName.trim();
    proj.owner     = (puState.projectOwner     || '').trim();
    proj.dept      = (puState.projectDept      || '').trim();
    proj.clarityId = (puState.projectClarityId || '').trim();
    proj.status    = puState.projectStatus  || proj.status;
    proj.priority  = puState.projectPriority || proj.priority;
    proj.pct       = Math.min(100, Math.max(0, parseInt(puState.projectPct) || 0));
    proj.start     = puState.projectStart   || '';
    proj.end       = puState.projectEnd     || '';
    proj.budget    = puState.projectBudget  || 'green';
    proj.scope     = puState.projectScope   || 'green';
    proj.objective = (puState.projectObjective || '').trim();
    proj.note      = (puState.projectNote      || '').trim();
    proj.milestoneLabel = (puState.milestoneLabel || '').trim();
    proj.milestoneDate  = puState.milestoneDate  || '';
  }

  const entry = {
    id:              'upd_' + puState.projectId + '_' + Date.now(),
    savedAt:         new Date().toISOString(),
    weekOf:          puState.weekOf,
    pm:              p.owner || '',
    statusSnap:      puState.projectStatus || p.status,
    summary:         (puState.summary || '').trim(),
    progressCurrent: puState.progressCurrent || '',
    progressTotal:   puState.progressTotal   || '',
    progressUnit:    puState.progressUnit     || '',
    accomp:          toText(puState.items.accomp),
    upcoming:        toText(puState.items.upcoming),
    risks:           toText(puState.items.watch),
    decisions:       toText(puState.items.decisions || []),
    issues:          '',
  };

  if (!db.updates) db.updates = {};
  if (!db.updates[puState.projectId]) db.updates[puState.projectId] = [];
  db.updates[puState.projectId].unshift(entry);

  persist(); renderAll(); closePMUpdate();
  toast('Update posted — ' + p.name);
}

  const projs = db.projects;

    'off-track': projs.filter(p=>p.status==='off-track'),

    `${'─'.repeat(50)}`,

    fmt(groups['off-track']),
    '',
    `⚠️  AT RISK (${groups['at-risk'].length})`,
    fmt(groups['at-risk']),
    '',
    `✅ ON TRACK (${groups['on-track'].length})`,
    fmt(groups['on-track']),
    '',
    ...(groups['complete'].length ? [`🏁 COMPLETE (${groups['complete'].length})`, fmt(groups['complete']), ''] : []),
    ...(groups['on-hold'].length  ? [`⏸  ON HOLD (${groups['on-hold'].length})`,  fmt(groups['on-hold']),  ''] : []),
    `${'─'.repeat(50)}`,
    `🚩 DECISIONS NEEDED (${allDecisions.length})`,

  let container = document.getElementById('digestModal');
  if (!container) { container = document.createElement('div'); container.id = 'digestModal'; document.body.appendChild(container); }
  container.innerHTML = `
    <div class="digest-overlay" onclick="if(event.target===this)closeDigest()">
      <div class="digest-modal">
        <div style="padding:18px 24px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
          <div>
            <div style="font-size:15px;font-weight:700;color:var(--g900)">Weekly Status Digest</div>
            <div style="font-size:12px;color:var(--g400);margin-top:2px">${today} · ${projs.length} initiatives</div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-ghost" onclick="copyDigest()" style="font-size:11px">
              <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
              Copy
            </button>
            <button onclick="closeDigest()" style="width:28px;height:28px;border:none;border-radius:6px;background:var(--g100);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--g500)">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>
        <div class="digest-body">
          <div class="digest-text" id="digestText">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
        </div>
      </div>
    </div>`;
}
function closeDigest() { const el = document.getElementById('digestModal'); if(el) el.innerHTML=''; }
function copyDigest() {
  const el = document.getElementById('digestText');
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => toast('Digest copied to clipboard'));
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderAll();
</script>
<div id="puModal"></div>
</body>
</html>
